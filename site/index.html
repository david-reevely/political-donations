<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contributor donation search</title>
<style>
:root{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
body{margin:0;padding:1.2rem 1.5rem 4rem;color:#1a1a1a;max-width:1100px;}
h1{font-size:1.15rem;margin:0 0 .8rem;}
form{margin-bottom:1rem;}
input[type=text]{font-size:1rem;padding:.45rem .6rem;width:24rem;max-width:70vw;
  border:1px solid #888;border-radius:4px;}
button{font-size:1rem;padding:.45rem .9rem;margin-left:.4rem;cursor:pointer;}
.note{color:#555;font-size:.85rem;margin:.3rem 0 1rem;}
table{border-collapse:collapse;width:100%;font-size:.86rem;margin:.3rem 0 1.4rem;}
th,td{text-align:left;padding:.3rem .55rem;border-bottom:1px solid #e2e2e2;vertical-align:top;}
th{background:#f4f4f4;border-bottom:1px solid #ccc;}
td.num,th.num{text-align:right;white-space:nowrap;}
.grp{margin-top:1.6rem;}
.grp h2{font-size:.98rem;margin:0 0 .2rem;}
.grp .meta{color:#555;font-size:.82rem;margin:0 0 .4rem;}
.summary th,.summary td{font-size:.84rem;}
.summary td:first-child,.summary th:first-child{width:1.6rem;text-align:center;}
.summary tr.sel{background:#eef6ff;}
.summary input.pick{cursor:pointer;}
.tot{font-weight:600;}
.warn{background:#fff7e6;border:1px solid #f0c674;padding:.5rem .7rem;border-radius:4px;
  font-size:.85rem;margin:.5rem 0 1rem;}
.viewbar{margin:.1rem 0 .6rem;}
.viewbar a{display:inline-block;padding:.32rem .75rem;border:1px solid #bbb;text-decoration:none;
  color:#333;border-radius:4px;margin-right:.35rem;font-size:.88rem;}
.viewbar a.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.ctrl{display:inline-block;margin:0 0 1rem .1rem;font-size:.85rem;color:#333;cursor:pointer;}
.ctrl .hint{color:#888;}
.legend{font-size:.82rem;color:#444;margin:.1rem 0 .7rem;}
.legend span{display:inline-block;margin-right:.9rem;white-space:nowrap;}
.legend i{display:inline-block;width:.7rem;height:.7rem;border-radius:2px;margin-right:.28rem;
  position:relative;top:.05rem;}
table.chrono tr.party td:first-child{border-left:4px solid currentColor;}
table.chrono td{font-variant-numeric:tabular-nums;}
.filing details{font-size:.8rem;}
.filing summary{cursor:pointer;color:#0645ad;white-space:nowrap;}
.filing ul{margin:.3rem 0;padding-left:1rem;}
.filing .ent{color:#777;}
.foot{color:#888;font-size:.78rem;margin-top:2rem;border-top:1px solid #eee;padding-top:.6rem;}
.status{color:#555;font-size:.9rem;}
.err{color:#a4243b;}
</style>
</head>
<body>
<h1>Elections Canada contributor donation search</h1>

<form id="f">
  <input type="text" id="q" name="q" autocomplete="off" autofocus
         placeholder="e.g. Smith, John  or  John Smith Ottawa">
  <button type="submit">Search</button>
</form>
<p class="note">Search by surname (a first name or city narrows it).
Matching is accent- and case-insensitive. Source: already-public Elections
Canada data; contributor names are not unique identifiers, so check city /
postal code before relying on a match.</p>

<div id="results"></div>
<div class="foot" id="foot"></div>

<script src="./search.js"></script>
<script src="./render.js"></script>
<script>
(function () {
  "use strict";
  var state = { manifest: null, cache: {}, query: "", view: "recipient",
                rows: [], truncated: false, selected: {}, deduped: true };
  var results = document.getElementById("results");
  var foot = document.getElementById("foot");
  var SEP = "\u0000";

  function setStatus(msg, isErr) {
    results.innerHTML = "<p class='status" + (isErr ? " err" : "") + "'>" + msg + "</p>";
  }

  async function gunzipToText(buf) {
    var u8 = new Uint8Array(buf);
    if (u8[0] === 0x1f && u8[1] === 0x8b) {
      var stream = new Response(u8).body.pipeThrough(new DecompressionStream("gzip"));
      return await new Response(stream).text();
    }
    return new TextDecoder().decode(u8);
  }

  async function loadBucket(b) {
    if (state.cache[b]) return state.cache[b];
    var resp = await fetch("./shards/s" + b + ".json.gz");
    if (!resp.ok) {
      if (resp.status === 404) return (state.cache[b] = []);
      throw new Error("shard " + b + ": HTTP " + resp.status);
    }
    var text = await gunzipToText(await resp.arrayBuffer());
    return (state.cache[b] = Search.expandShard(JSON.parse(text)));
  }

  function render() {
    results.innerHTML = Render.renderResults(state.query, state.rows, state.truncated,
      { view: state.view, deduped: state.deduped, selected: state.selected });
    var clear = results.querySelector(".clearsel");
    if (clear) clear.style.display = Object.keys(state.selected).length ? "" : "none";
  }

  async function runSearch(q) {
    state.query = q;
    state.selected = {};
    if (!q) { results.innerHTML = ""; return; }
    setStatus("Searching\u2026");
    try {
      var res = await Search.runQuery(q, state.manifest.nbuckets, loadBucket);
      state.rows = res.rows; state.truncated = res.truncated;
      render();
    } catch (e) {
      setStatus("Search failed: " + Render.esc(e.message), true);
    }
  }

  function updateUrl(push) {
    var p = new URLSearchParams();
    if (state.query) p.set("q", state.query);
    p.set("view", state.view);
    history[push ? "pushState" : "replaceState"]({}, "", "?" + p.toString());
  }

  // Delegated handlers on the persistent results container.
  results.addEventListener("change", function (ev) {
    var t = ev.target;
    if (t.id === "dedupe") { state.deduped = t.checked; render(); return; }
    if (t.classList && t.classList.contains("pick")) {
      var tr = t.closest("tr");
      var key = tr.dataset.name + SEP + tr.dataset.city + SEP + tr.dataset.prov;
      if (t.checked) state.selected[key] = true; else delete state.selected[key];
      render();
    }
  });
  results.addEventListener("click", function (ev) {
    var a = ev.target.closest && ev.target.closest(".viewbar a");
    if (a) { ev.preventDefault(); state.view = a.dataset.view === "chrono" ? "chrono" : "recipient"; updateUrl(true); render(); return; }
    var c = ev.target.closest && ev.target.closest(".clearsel");
    if (c) { ev.preventDefault(); state.selected = {}; render(); }
  });

  document.getElementById("f").addEventListener("submit", function (ev) {
    ev.preventDefault();
    state.query = document.getElementById("q").value.trim();
    updateUrl(true);
    runSearch(state.query);
  });

  window.addEventListener("popstate", function () {
    var p = new URLSearchParams(location.search);
    state.view = p.get("view") === "chrono" ? "chrono" : "recipient";
    var q = (p.get("q") || "").trim();
    document.getElementById("q").value = q;
    runSearch(q);
  });

  // ---- init --------------------------------------------------------------
  if (typeof DecompressionStream === "undefined") {
    setStatus("This tool needs a current browser (gzip decompression support).", true);
    return;
  }
  fetch("./manifest.json").then(function (r) { return r.json(); }).then(function (m) {
    state.manifest = m;
    foot.textContent = "Data built " + m.built + " \u00b7 " +
      m.rows.toLocaleString() + " contribution records \u00b7 " + m.source;
    var p = new URLSearchParams(location.search);
    state.view = p.get("view") === "chrono" ? "chrono" : "recipient";
    var q = (p.get("q") || "").trim();
    if (q) { document.getElementById("q").value = q; runSearch(q); }
  }).catch(function (e) {
    setStatus("Couldn't load the data index (manifest.json): " + Render.esc(e.message), true);
  });
})();
</script>
</body>
</html>
